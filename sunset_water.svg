<svg width="100%" viewBox="0 0 680 220" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Sun reflection on water with mountains and birds</title>
<desc>Pixel art sunset water reflection with waves, distant mountains and flying birds</desc>
<style>
@keyframes wave1{0%,100%{transform:translateX(0)}50%{transform:translateX(-8px)}}
@keyframes wave2{0%,100%{transform:translateX(0)}50%{transform:translateX(8px)}}
@keyframes wave3{0%,100%{transform:translateX(0)}50%{transform:translateX(-5px)}}
@keyframes glow{0%,100%{opacity:0.4}50%{opacity:0.7}}
@keyframes sh1{0%,100%{opacity:0.3}33%{opacity:0.8}66%{opacity:0.4}}
@keyframes sh2{0%,100%{opacity:0.5}40%{opacity:0.2}70%{opacity:0.9}}
@keyframes sh3{0%,100%{opacity:0.4}25%{opacity:0.9}75%{opacity:0.2}}
@keyframes bird{0%{transform:translateX(0) translateY(0)}25%{transform:translateX(10px) translateY(-4px)}50%{transform:translateX(20px) translateY(0)}75%{transform:translateX(30px) translateY(-3px)}100%{transform:translateX(40px) translateY(0)}}
.w1{animation:wave1 2.4s ease-in-out infinite}
.w2{animation:wave2 2.1s ease-in-out infinite}
.w3{animation:wave3 1.8s ease-in-out infinite}
.gl{animation:glow 2s ease-in-out infinite}
.s1{animation:sh1 1.8s infinite}
.s2{animation:sh2 2.2s infinite}
.s3{animation:sh3 1.5s infinite}
.b1{animation:bird 5s linear infinite}
.b2{animation:bird 5s linear 1.8s infinite}
.b3{animation:bird 5s linear 0.9s infinite}
.b4{animation:bird 5s linear 2.7s infinite}
</style>
